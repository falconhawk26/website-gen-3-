<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Multi‑Page Site Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: auto; }
    h1, h2 { text-align: center; }
    label { display: block; margin-top: 1rem; margin-bottom: 0.3rem; }
    input, textarea, select {
      width: 100%;
      padding: 0.7rem;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e5e7eb;
      font-size: 0.95rem;
    }
    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      margin-bottom: 2rem;
    }
    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
      background: white;
      margin-top: 1rem;
    }
    details {
      background: #1e293b;
      padding: 1rem;
      border-radius: 10px;
      border: 1px solid #334155;
      margin-top: 1rem;
    }
    summary {
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    textarea.code {
      width: 100%;
      height: 260px;
      background: #0f172a;
      color: #e5e7eb;
      border: none;
      padding: 1rem;
      border-radius: 10px;
      font-family: monospace;
      resize: vertical;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Multi‑Page Website Generator</h1>

    <label>Site name</label>
    <input id="site-name" placeholder="e.g. Shaffer's Market" />

    <label>Pages (comma‑separated)</label>
    <input id="pages" placeholder="Home, About, Menu, Contact" />

    <label>Describe your website</label>
    <textarea id="description" rows="4" placeholder="Type of business, vibe, what sections you want..."></textarea>

    <label>Theme</label>
    <select id="theme">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="colorful">Colorful</option>
    </select>

    <label>
      <input type="checkbox" id="online-ordering" />
      Enable online ordering
    </label>

    <label>Custom images (optional)</label>
    <input type="file" id="images" multiple accept="image/*" />

    <button id="generate-btn">Generate Website</button>

    <h2>Homepage Preview</h2>
    <iframe id="preview"></iframe>

    <h2>Generated Files</h2>
    <div id="output"></div>
  </div>

  <script>
    const generateBtn = document.getElementById("generate-btn");
    const preview = document.getElementById("preview");
    const output = document.getElementById("output");
    const imagesInput = document.getElementById("images");

    let imageDataUrls = [];

    imagesInput.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files);
      imageDataUrls = [];
      for (const file of files) {
        const url = await fileToDataURL(file);
        imageDataUrls.push(url);
      }
    });

    function fileToDataURL(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    generateBtn.addEventListener("click", () => {
      const name = document.getElementById("site-name").value.trim() || "My Website";
      const pagesInput = document.getElementById("pages").value.trim() || "Home, About, Contact";
      const description = document.getElementById("description").value.trim() || "A modern website.";
      const theme = document.getElementById("theme").value;
      const onlineOrdering = document.getElementById("online-ordering").checked;

      const pages = pagesInput.split(",").map(p => p.trim()).filter(Boolean);

      const files = {};
      pages.forEach((page, index) => {
        const filename = index === 0 ? "index.html" : `${slugify(page)}.html`;
        files[filename] = buildPageHTML({
          siteName: name,
          pageName: page,
          pages,
          description,
          theme,
          onlineOrdering
        });
      });

      files["style.css"] = buildCSS();

      preview.srcdoc = files["index.html"];

      output.innerHTML = "";
      for (const [filename, content] of Object.entries(files)) {
        output.innerHTML += `
          <details>
            <summary>${filename}</summary>
            <textarea class="code" readonly>${content}</textarea>
          </details>
        `;
      }
    });

    function slugify(str) {
      return str.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "page";
    }

    function buildCSS() {
      return `body.theme-light{background:#f3f4f6;color:#111827;}
body.theme-dark{background:#0f172a;color:#e5e7eb;}
body.theme-colorful{background:linear-gradient(135deg,#0ea5e9,#22c55e);color:#0f172a;}
nav{padding:1rem 2rem;background:#111827;color:white;display:flex;gap:1rem;}
nav a{color:inherit;text-decoration:none;font-weight:600;}
main{max-width:960px;margin:auto;padding:2rem;}
header.hero{padding:2rem;border-radius:12px;margin-bottom:2rem;background:#1e293b;color:white;}
section.card{background:white;padding:1.5rem;border-radius:12px;margin-top:1.5rem;}
section.card img{width:100%;border-radius:10px;margin-top:1rem;}
.order-section{background:#f97316;padding:1.5rem;border-radius:12px;margin-top:2rem;}
.order-section button{padding:0.7rem 1.4rem;border-radius:999px;border:none;cursor:pointer;font-weight:600;}`;
    }

    function buildPageHTML({ siteName, pageName, pages, description, theme, onlineOrdering }) {
      const themeClass =
        theme === "dark" ? "theme-dark" :
        theme === "colorful" ? "theme-colorful" :
        "theme-light";

      const navLinks = pages.map((p, i) => {
        const fname = i === 0 ? "index.html" : `${slugify(p)}.html`;
        return `<a href="${fname}">${p}</a>`;
      }).join("");

      const hero = `
      <header class="hero">
        <h1>${siteName} – ${pageName}</h1>
        <p>${description}</p>
      </header>`;

      const imagesHTML = imageDataUrls.map(url => `
        <img src="${url}" alt="Image for ${siteName}">
      `).join("");

      const imageSection = imagesHTML
        ? `<section class="card">
             <h2>Gallery</h2>
             ${imagesHTML}
           </section>`
        : "";

      const orderingSection = onlineOrdering ? `
      <section class="order-section">
        <h2>Online Ordering</h2>
        <p>Replace this with your real ordering link.</p>
        <button onclick="alert('Connect this to your ordering system.')">Order Now</button>
      </section>` : "";

      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>${siteName} – ${pageName}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="${themeClass}">
  <nav>${navLinks}</nav>
  <main>
    ${hero}
    <section class="card">
      <h2>About This Page</h2>
      <p>${description}</p>
    </section>
    ${imageSection}
    ${orderingSection}
  </main>
</body>
</html>`;
    }
  </script>
</body>
</html>
